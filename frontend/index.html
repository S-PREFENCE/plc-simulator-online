<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Mobile PLC Programmer - 手机端PLC编程器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }
        
        /* 顶部标题栏 */
        .header {
            background: linear-gradient(135deg, #2d3561 0%, #1e2749 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 1px 5px rgba(102, 126, 234, 0.5);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        /* 主容器 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 指令面板 */
        .instruction-panel {
            background: linear-gradient(135deg, #2d3561 0%, #1e2749 100%);
            padding: 15px;
            border-bottom: 2px solid #444;
        }
        
        .instruction-title {
            font-size: 14px;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .instruction-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .instruction-btn {
            background: linear-gradient(135deg, #3a3f5c 0%, #2a2f4a 100%);
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 12px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .instruction-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }
        
        .instruction-btn.selected {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-color: #38ef7d;
        }
        
        .instruction-symbol {
            font-size: 18px;
            font-weight: bold;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
        }
        
        .instruction-name {
            font-size: 10px;
            opacity: 0.8;
        }
        
        /* 编程区域 */
        .programming-area {
            flex: 1;
            background: #1e1e2e;
            overflow: auto;
            position: relative;
        }
        
        .ladder-canvas {
            background: #1e1e2e;
            background-image: 
                linear-gradient(rgba(100, 100, 100, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 100, 100, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100%;
            padding: 20px;
        }
        
        .rung {
            position: relative;
            height: 80px;
            margin-bottom: 10px;
            background: rgba(30, 30, 50, 0.5);
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        
        .rung-line {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 3px;
            background: #4CAF50;
            z-index: 1;
        }
        
        .element {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #3a3f5c 0%, #2a2f4a 100%);
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 0 5px;
            cursor: pointer;
            min-width: 60px;
            text-align: center;
            transition: all 0.2s ease;
        }
        
        .element:active {
            transform: scale(0.95);
        }
        
        .element.selected {
            border-color: #38ef7d;
            box-shadow: 0 0 15px rgba(56, 239, 125, 0.5);
        }
        
        .element-symbol {
            font-size: 20px;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        .element-address {
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
        }
        
        .add-element-btn {
            background: transparent;
            border: 2px dashed #555;
            color: #555;
            border-radius: 8px;
            padding: 15px;
            margin: 0 5px;
            cursor: pointer;
            font-size: 24px;
            min-width: 60px;
            transition: all 0.2s ease;
        }
        
        .add-element-btn:active {
            border-color: #667eea;
            color: #667eea;
        }
        
        /* 变量监视器 */
        .monitor-panel {
            background: linear-gradient(135deg, #2d3561 0%, #1e2749 100%);
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 2px solid #444;
        }
        
        .monitor-title {
            font-size: 14px;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .variable-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .variable-item {
            background: rgba(30, 30, 50, 0.5);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .variable-name {
            font-size: 12px;
            font-weight: bold;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
        }
        
        .variable-value {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #333;
            font-family: 'Courier New', monospace;
            min-width: 40px;
            text-align: center;
        }
        
        .variable-value.on {
            background: #38ef7d;
            color: #000;
        }
        
        .variable-value.off {
            background: #f5576c;
            color: #fff;
        }
        
        /* 属性编辑器 */
        .property-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .property-modal.show {
            display: flex;
        }
        
        .property-content {
            background: linear-gradient(135deg, #2d3561 0%, #1e2749 100%);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #667eea;
        }
        
        .property-title {
            font-size: 16px;
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: rgba(30, 30, 50, 0.5);
            color: #e0e0e0;
            font-size: 14px;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons .btn {
            flex: 1;
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            display: none;
            font-size: 14px;
        }
        
        .toast.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 16px;
            }
            
            .instruction-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .variable-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <div class="header">
        <h1>📱 手机端PLC编程器</h1>
        <div class="header-actions">
            <button class="btn btn-success" onclick="saveProgram()">💾 保存</button>
            <button class="btn btn-warning" onclick="runSimulation()">▶️ 运行</button>
        </div>
    </div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 指令面板 -->
        <div class="instruction-panel">
            <div class="instruction-title">🔧 PLC指令库</div>
            <div class="instruction-grid" id="instructionGrid">
                <button class="instruction-btn" data-type="contact_n" onclick="selectInstruction('contact_n')">
                    <div class="instruction-symbol">—| |—</div>
                    <div class="instruction-name">常开触点</div>
                </button>
                <button class="instruction-btn" data-type="contact_nc" onclick="selectInstruction('contact_nc')">
                    <div class="instruction-symbol">—|/|—</div>
                    <div class="instruction-name">常闭触点</div>
                </button>
                <button class="instruction-btn" data-type="coil" onclick="selectInstruction('coil')">
                    <div class="instruction-symbol">—( )—</div>
                    <div class="instruction-name">线圈</div>
                </button>
                <button class="instruction-btn" data-type="coil_set" onclick="selectInstruction('coil_set')">
                    <div class="instruction-symbol">—(S)—</div>
                    <div class="instruction-name">置位</div>
                </button>
                <button class="instruction-btn" data-type="coil_reset" onclick="selectInstruction('coil_reset')">
                    <div class="instruction-symbol">—(R)—</div>
                    <div class="instruction-name">复位</div>
                </button>
                <button class="instruction-btn" data-type="timer_on" onclick="selectInstruction('timer_on')">
                    <div class="instruction-symbol">TON</div>
                    <div class="instruction-name">延时通</div>
                </button>
                <button class="instruction-btn" data-type="timer_off" onclick="selectInstruction('timer_off')">
                    <div class="instruction-symbol">TOF</div>
                    <div class="instruction-name">延时断</div>
                </button>
                <button class="instruction-btn" data-type="counter_up" onclick="selectInstruction('counter_up')">
                    <div class="instruction-symbol">CTU</div>
                    <div class="instruction-name">计数器</div>
                </button>
            </div>
        </div>
        
        <!-- 编程区域 -->
        <div class="programming-area" id="programmingArea">
            <div class="ladder-canvas" id="ladderCanvas">
                <!-- 梯级将动态生成 -->
            </div>
        </div>
        
        <!-- 变量监视器 -->
        <div class="monitor-panel">
            <div class="monitor-title">📊 变量监视器</div>
            <div class="variable-grid" id="variableGrid">
                <!-- 变量将动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 属性编辑器模态框 -->
    <div class="property-modal" id="propertyModal">
        <div class="property-content">
            <div class="property-title">编辑元件属性</div>
            <div class="form-group">
                <label>元件类型:</label>
                <input type="text" id="propType" readonly>
            </div>
            <div class="form-group">
                <label>地址:</label>
                <input type="text" id="propAddress" placeholder="例如: I0.0, Q0.0, M0.0">
            </div>
            <div class="form-group" id="presetGroup" style="display:none;">
                <label>预设值:</label>
                <input type="number" id="propPreset" placeholder="例如: 1000">
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="confirmProperty()">确定</button>
                <button class="btn btn-warning" onclick="deleteElement()">删除</button>
                <button class="btn" onclick="closePropertyModal()" style="background:#555;">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 消息提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局变量
        let program = {
            rungs: [
                { id: 1, elements: [] },
                { id: 2, elements: [] },
                { id: 3, elements: [] }
            ]
        };
        
        let selectedInstruction = null;
        let selectedElement = null;
        let elementIdCounter = 1;
        
        // 变量数据
        let variables = {
            'I0.0': false, 'I0.1': false, 'I0.2': false, 'I0.3': false,
            'Q0.0': false, 'Q0.1': false, 'Q0.2': false, 'Q0.3': false,
            'M0.0': false, 'M0.1': false
        };
        
        // 指令符号映射
        const instructionSymbols = {
            'contact_n': '—| |—',
            'contact_nc': '—|/|—',
            'coil': '—( )—',
            'coil_set': '—(S)—',
            'coil_reset': '—(R)—',
            'timer_on': 'TON',
            'timer_off': 'TOF',
            'counter_up': 'CTU'
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderProgram();
            renderVariables();
        });
        
        // 选择指令
        function selectInstruction(type) {
            selectedInstruction = type;
            
            // 更新UI
            document.querySelectorAll('.instruction-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.closest('.instruction-btn').classList.add('selected');
            
            showToast('已选择: ' + getInstructionName(type));
        }
        
        // 获取指令名称
        function getInstructionName(type) {
            const names = {
                'contact_n': '常开触点',
                'contact_nc': '常闭触点',
                'coil': '线圈',
                'coil_set': '置位线圈',
                'coil_reset': '复位线圈',
                'timer_on': '接通延时定时器',
                'timer_off': '断开延时定时器',
                'counter_up': '加计数器'
            };
            return names[type] || type;
        }
        
        // 渲染程序
        function renderProgram() {
            const canvas = document.getElementById('ladderCanvas');
            canvas.innerHTML = '';
            
            program.rungs.forEach((rung, index) => {
                const rungDiv = document.createElement('div');
                rungDiv.className = 'rung';
                rungDiv.innerHTML = '<div class="rung-line"></div>';
                
                // 添加现有元件
                rung.elements.forEach(element => {
                    const elementDiv = createElementDiv(element, index);
                    rungDiv.appendChild(elementDiv);
                });
                
                // 添加新元件按钮
                const addBtn = document.createElement('button');
                addBtn.className = 'add-element-btn';
                addBtn.innerHTML = '+';
                addBtn.onclick = () => addElement(index);
                rungDiv.appendChild(addBtn);
                
                canvas.appendChild(rungDiv);
            });
            
            // 添加新梯级按钮
            const addRungBtn = document.createElement('div');
            addRungBtn.className = 'rung';
            addRungBtn.style.background = 'transparent';
            addRungBtn.style.border = '2px dashed #555';
            addRungBtn.innerHTML = '<button class="btn" onclick="addRung()" style="width:100%;">+ 添加新梯级</button>';
            canvas.appendChild(addRungBtn);
        }
        
        // 创建元件DOM
        function createElementDiv(element, rungIndex) {
            const div = document.createElement('div');
            div.className = 'element';
            div.innerHTML = `
                <div class="element-symbol">${instructionSymbols[element.type]}</div>
                <div class="element-address">${element.address}</div>
            `;
            div.onclick = (e) => {
                e.stopPropagation();
                openPropertyModal(element, rungIndex);
            };
            return div;
        }
        
        // 添加元件
        function addElement(rungIndex) {
            if (!selectedInstruction) {
                showToast('请先选择一个指令！');
                return;
            }
            
            const newElement = {
                id: elementIdCounter++,
                type: selectedInstruction,
                address: getDefaultAddress(selectedInstruction),
                preset: 1000
            };
            
            program.rungs[rungIndex].elements.push(newElement);
            renderProgram();
            showToast('已添加: ' + getInstructionName(selectedInstruction));
        }
        
        // 获取默认地址
        function getDefaultAddress(type) {
            switch(type) {
                case 'contact_n':
                case 'contact_nc':
                    return 'I0.0';
                case 'coil':
                case 'coil_set':
                case 'coil_reset':
                    return 'Q0.0';
                case 'timer_on':
                case 'timer_off':
                    return 'T0';
                case 'counter_up':
                    return 'C0';
                default:
                    return 'M0.0';
            }
        }
        
        // 添加梯级
        function addRung() {
            program.rungs.push({ id: program.rungs.length + 1, elements: [] });
            renderProgram();
            showToast('已添加新梯级');
        }
        
        // 渲染变量监视器
        function renderVariables() {
            const grid = document.getElementById('variableGrid');
            grid.innerHTML = '';
            
            Object.entries(variables).forEach(([name, value]) => {
                const div = document.createElement('div');
                div.className = 'variable-item';
                div.innerHTML = `
                    <span class="variable-name">${name}</span>
                    <span class="variable-value ${value ? 'on' : 'off'}" onclick="toggleVariable('${name}')">${value ? '1' : '0'}</span>
                `;
                grid.appendChild(div);
            });
        }
        
        // 切换变量值
        function toggleVariable(name) {
            variables[name] = !variables[name];
            renderVariables();
            executeLogic();
            showToast(`${name} = ${variables[name] ? '1' : '0'}`);
        }
        
        // 执行逻辑（简化版）
        function executeLogic() {
            // 简单的逻辑执行示例
            // 实际应用中需要实现完整的梯形图扫描周期
            
            // 示例：如果I0.0为真，则Q0.0为真
            if (variables['I0.0']) {
                variables['Q0.0'] = true;
            }
            
            renderVariables();
        }
        
        // 打开属性编辑器
        function openPropertyModal(element, rungIndex) {
            selectedElement = { element, rungIndex };
            
            document.getElementById('propType').value = getInstructionName(element.type);
            document.getElementById('propAddress').value = element.address;
            
            const presetGroup = document.getElementById('presetGroup');
            if (element.type === 'timer_on' || element.type === 'timer_off' || element.type === 'counter_up') {
                presetGroup.style.display = 'block';
                document.getElementById('propPreset').value = element.preset || 1000;
            } else {
                presetGroup.style.display = 'none';
            }
            
            document.getElementById('propertyModal').classList.add('show');
        }
        
        // 关闭属性编辑器
        function closePropertyModal() {
            document.getElementById('propertyModal').classList.remove('show');
            selectedElement = null;
        }
        
        // 确认属性修改
        function confirmProperty() {
            if (selectedElement) {
                selectedElement.element.address = document.getElementById('propAddress').value;
                
                const preset = document.getElementById('propPreset').value;
                if (preset) {
                    selectedElement.element.preset = parseInt(preset);
                }
                
                renderProgram();
                showToast('属性已更新');
            }
            closePropertyModal();
        }
        
        // 删除元件
        function deleteElement() {
            if (selectedElement) {
                const rungIndex = selectedElement.rungIndex;
                const elementId = selectedElement.element.id;
                program.rungs[rungIndex].elements = program.rungs[rungIndex].elements.filter(e => e.id !== elementId);
                renderProgram();
                showToast('元件已删除');
            }
            closePropertyModal();
        }
        
        // 保存程序
        function saveProgram() {
            const programJson = JSON.stringify(program, null, 2);
            console.log('保存的程序:', programJson);
            showToast('程序已保存到本地！');
            
            // 可以添加下载功能
            const blob = new Blob([programJson], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'plc_program.json';
            a.click();
        }
        
        // 运行仿真
        function runSimulation() {
            showToast('▶️ 仿真运行中...');
            executeLogic();
            
            setTimeout(() => {
                showToast('✅ 仿真完成！');
            }, 1000);
        }
        
        // 显示提示消息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
