<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>PLC Mobile Editor Pro v3.0</title>
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        :root {
            --bg-dark: #1e1e1e; --bg-panel: #252526; --bg-hover: #2d2d30;
            --border: #3e3e42; --accent: #007acc; --accent-hover: #1a8ad4;
            --green: #4ec9b0; --green-dim: rgba(78,201,176,0.2);
            --red: #f44747; --yellow: #cca700; --orange: #ff8c00;
            --text: #e0e0e0; --text-dim: #9cdcfe; --text-muted: #666;
            --font-mono: 'Consolas','Monaco','Courier New', monospace;
        }
        body { font-family: var(--font-mono); background: var(--bg-dark); color: var(--text); overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        /* ===== 顶部状态栏 ===== */
        .top-bar { height: 36px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 12px; flex-shrink: 0; }
        .top-left, .top-right { display: flex; gap: 8px; align-items: center; }
        .status-indicator { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--green); font-weight: bold; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; transition: background 0.3s; }
        .status-dot.run { background: var(--green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
        .project-name { font-size: 12px; color: var(--text-muted); margin-left: 10px; }
        .btn-s { background: var(--accent); color: #fff; border: none; padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; transition: all 0.15s; font-family: var(--font-mono); }
        .btn-s:active { transform: scale(0.95); background: var(--accent-hover); }
        .btn-s.success { background: var(--green); color: #000; }
        .btn-s.danger { background: var(--red); }
        .btn-s.warn { background: var(--yellow); color: #000; }

        /* ===== 主容器 ===== */
        .main-wrap { flex: 1; display: flex; overflow: hidden; }

        /* ===== 左侧工具栏 ===== */
        .left-toolbar { width: 52px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 6px 0; flex-shrink: 0; transition: width 0.25s, padding 0.25s; overflow: hidden; }
        .left-toolbar.collapsed { width: 0; padding: 0; border: none; }
        .tool-btn { width: 40px; height: 40px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 4px; margin: 3px 0; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1px; transition: all 0.15s; font-size: 15px; color: var(--text); }
        .tool-btn:active { background: var(--accent); border-color: var(--accent); transform: scale(0.93); }
        .tool-btn.active { background: var(--green); border-color: var(--green); color: #000; }
        .tool-btn .lbl { font-size: 8px; opacity: 0.8; line-height: 1; }

        /* ===== 中央编辑区 ===== */
        .editor-area { flex: 1; overflow: auto; position: relative; background: var(--bg-dark); background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 40px 40px; }
        .editor-inner { position: relative; min-width: 100%; min-height: 100%; padding: 10px 10px 10px 20px; }
        .power-rail-svg { position: absolute; left: 0; top: 0; width: 20px; height: 100%; pointer-events: none; }
        .rung-row { position: relative; display: flex; align-items: center; min-height: 56px; margin: 6px 0; padding-left: 20px; }
        .rung-label { position: absolute; left: -16px; font-size: 9px; color: var(--text-muted); width: 16px; text-align: right; }
        .rung-cells { display: flex; align-items: center; flex: 1; gap: 2px; position: relative; }
        .rung-line { position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: #3a3a3a; z-index: 0; transition: background 0.3s, box-shadow 0.3s; }
        .rung-line.energized { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .cell { position: relative; z-index: 1; min-width: 70px; height: 46px; background: var(--bg-hover); border: 2px solid var(--accent); border-radius: 5px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.15s; padding: 2px 4px; }
        .cell:active { transform: scale(0.95); }
        .cell.selected { border-color: var(--green); box-shadow: 0 0 10px var(--green-dim); }
        .cell.energized { border-color: var(--green); background: var(--green-dim); }
        .cell-symbol { font-size: 14px; color: var(--text-dim); font-weight: bold; line-height: 1.2; }
        .cell-addr { font-size: 9px; color: var(--text-muted); line-height: 1; }
        .cell.energized .cell-symbol { color: var(--green); }
        .cell.energized .cell-addr { color: var(--green); }
        /* 加号按钮 */
        .cell-add { min-width: 30px; height: 30px; background: transparent; border: 2px dashed #444; border-radius: 4px; color: #444; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; z-index: 1; }
        .cell-add:active { border-color: var(--accent); color: var(--accent); }
        /* 添加梯级 */
        .rung-add { display: flex; justify-content: center; padding: 8px; }
        .rung-add button { background: transparent; border: 2px dashed #444; border-radius: 6px; color: #555; padding: 6px 20px; font-size: 12px; cursor: pointer; font-family: var(--font-mono); transition: all 0.15s; }
        .rung-add button:active { border-color: var(--accent); color: var(--accent); }

        /* ===== 右侧监控栏 ===== */
        .right-monitor { width: 130px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.25s; overflow: hidden; }
        .right-monitor.collapsed { width: 0; border: none; }
        .mon-header { padding: 6px 8px; background: var(--bg-hover); font-size: 11px; font-weight: bold; color: var(--green); text-align: center; border-bottom: 1px solid var(--border); }
        .mon-list { flex: 1; overflow-y: auto; padding: 6px; }
        .mon-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 5px; margin: 2px 0; background: rgba(45,45,48,0.5); border-radius: 3px; font-size: 10px; }
        .mon-name { color: var(--text-dim); }
        .mon-val { min-width: 32px; padding: 2px 4px; border-radius: 2px; text-align: center; font-weight: bold; font-size: 9px; }
        .mon-val.on { background: var(--green); color: #000; }
        .mon-val.off { background: var(--bg-hover); color: var(--text-muted); }
        .mon-timer { font-size: 9px; color: var(--text-muted); padding: 3px 5px; margin: 2px 0; background: rgba(45,45,48,0.5); border-radius: 3px; }
        .mon-timer .bar { height: 3px; background: var(--accent); border-radius: 2px; margin-top: 2px; transition: width 0.3s; }

        /* ===== 底部操作栏 ===== */
        .bottom-bar { height: 42px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 12px; flex-shrink: 0; }
        .bottom-left, .bottom-center, .bottom-right { display: flex; gap: 6px; align-items: center; }
        .icon-btn { background: var(--bg-hover); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; justify-content: center; align-items: center; transition: all 0.15s; }
        .icon-btn:active { background: var(--accent); transform: scale(0.93); }
        .run-btn { background: var(--green); color: #000; width: auto; padding: 0 16px; font-size: 12px; font-weight: bold; border: none; border-radius: 4px; height: 32px; cursor: pointer; font-family: var(--font-mono); transition: all 0.15s; }
        .run-btn:active { transform: scale(0.95); }
        .stop-btn { background: var(--red); color: #fff; width: auto; padding: 0 16px; font-size: 12px; font-weight: bold; border: none; border-radius: 4px; height: 32px; cursor: pointer; font-family: var(--font-mono); transition: all 0.15s; }
        .stop-btn:active { transform: scale(0.95); }

        /* ===== 强制输入面板 ===== */
        .force-panel { position: absolute; bottom: 42px; left: 50%; transform: translateX(-50%) translateY(110%); background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px 6px 0 0; padding: 10px 14px; display: flex; gap: 12px; transition: transform 0.25s; z-index: 100; box-shadow: 0 -4px 16px rgba(0,0,0,0.5); max-width: 90vw; overflow-x: auto; }
        .force-panel.show { transform: translateX(-50%) translateY(0); }
        .force-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 44px; }
        .force-lbl { font-size: 9px; color: var(--text-dim); }
        .force-sw { width: 36px; height: 18px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 9px; position: relative; cursor: pointer; transition: background 0.2s; }
        .force-sw.on { background: var(--green); border-color: var(--green); }
        .force-sw::after { content: ''; position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; top: 1px; left: 1px; transition: transform 0.2s; }
        .force-sw.on::after { transform: translateX(18px); }

        /* ===== 悬浮添加按钮 ===== */
        .fab { position: absolute; bottom: 56px; right: 150px; width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #fff; cursor: pointer; box-shadow: 0 3px 12px rgba(0,122,204,0.4); z-index: 99; transition: all 0.2s; border: none; }
        .fab:active { transform: scale(0.9); }

        /* ===== 模态框 ===== */
        .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-bg.show { display: flex; }
        .modal-box { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px; min-width: 280px; max-width: 92vw; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 14px; color: var(--green); margin-bottom: 12px; font-weight: bold; }
        .form-row { margin-bottom: 10px; }
        .form-row label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
        .form-row input, .form-row select { width: 100%; padding: 6px 8px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: var(--font-mono); font-size: 12px; }
        .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); }
        .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
        .modal-btns .btn-s { flex: 1; padding: 6px; }

        /* ===== 代码片段模态 ===== */
        .snippet-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; padding: 10px; margin: 6px 0; cursor: pointer; transition: all 0.15s; }
        .snippet-card:active { border-color: var(--accent); background: var(--bg-hover); }
        .snippet-name { font-size: 12px; color: var(--accent); font-weight: bold; }
        .snippet-desc { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
        .snippet-preview { font-size: 9px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); white-space: pre; }

        /* ===== Toast ===== */
        .toast { position: fixed; top: 44px; left: 50%; transform: translateX(-50%) translateY(-120%); background: var(--bg-hover); color: var(--text); padding: 8px 16px; border-radius: 4px; border-left: 3px solid var(--accent); z-index: 2000; transition: transform 0.2s; font-size: 12px; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="top-bar">
        <div class="top-left">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="plcStatus">STOP</span>
            </div>
            <span class="project-name" id="projectName">未命名项目</span>
            <button class="btn-s" onclick="toggleToolbar()">☰</button>
        </div>
        <div class="top-right">
            <button class="btn-s" onclick="newProject()">新建</button>
            <button class="btn-s success" onclick="saveProgram()">保存</button>
            <button class="btn-s" onclick="loadProgram()">加载</button>
            <button class="btn-s warn" onclick="showSnippets()">片段库</button>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-wrap">
        <!-- 左侧工具栏 -->
        <div class="left-toolbar" id="leftToolbar">
            <button class="tool-btn" data-type="contact_n" onclick="selectTool('contact_n')"><span>-| |-</span><span class="lbl">常开</span></button>
            <button class="tool-btn" data-type="contact_nc" onclick="selectTool('contact_nc')"><span>-|/|-</span><span class="lbl">常闭</span></button>
            <button class="tool-btn" data-type="coil" onclick="selectTool('coil')"><span>-( )-</span><span class="lbl">线圈</span></button>
            <button class="tool-btn" data-type="coil_set" onclick="selectTool('coil_set')"><span>-(S)-</span><span class="lbl">置位</span></button>
            <button class="tool-btn" data-type="coil_reset" onclick="selectTool('coil_reset')"><span>-(R)-</span><span class="lbl">复位</span></button>
            <button class="tool-btn" data-type="timer_on" onclick="selectTool('timer_on')"><span>TON</span><span class="lbl">延时通</span></button>
            <button class="tool-btn" data-type="timer_off" onclick="selectTool('timer_off')"><span>TOF</span><span class="lbl">延时断</span></button>
            <button class="tool-btn" data-type="counter_up" onclick="selectTool('counter_up')"><span>CTU</span><span class="lbl">计数器</span></button>
            <button class="tool-btn" data-type="move" onclick="selectTool('move')"><span>MOV</span><span class="lbl">传送</span></button>
            <button class="tool-btn" data-type="compare_eq" onclick="selectTool('compare_eq')"><span>==</span><span class="lbl">比较</span></button>
        </div>

        <!-- 中央编辑区 -->
        <div class="editor-area" id="editorArea" onclick="handleEditorClick(event)">
            <div class="editor-inner" id="editorInner">
                <!-- SVG左母线 -->
                <svg class="power-rail-svg" id="railSvg"><line x1="16" y1="0" x2="16" y2="100%" stroke="var(--accent)" stroke-width="3"/></svg>
                <div id="rungsContainer"></div>
                <div class="rung-add"><button onclick="addRung()">+ 添加梯级</button></div>
            </div>
            <button class="fab" onclick="showQuickAdd()">+</button>
        </div>

        <!-- 右侧监控栏 -->
        <div class="right-monitor" id="rightMonitor">
            <div class="mon-header">I/O 监控</div>
            <div class="mon-list" id="monList"></div>
        </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="bottom-bar">
        <div class="bottom-left">
            <button class="icon-btn" onclick="undo()" title="撤销">↩</button>
            <button class="icon-btn" onclick="redo()" title="重做">↪</button>
            <button class="icon-btn" onclick="deleteSelected()" title="删除">✕</button>
        </div>
        <div class="bottom-center">
            <button class="run-btn" id="runBtn" onclick="startSim()">▶ RUN</button>
            <button class="stop-btn" id="stopBtn" onclick="stopSim()" style="display:none;">■ STOP</button>
        </div>
        <div class="bottom-right">
            <button class="icon-btn" onclick="toggleMonitor()" title="监控">📊</button>
            <button class="icon-btn" onclick="zoomIn()" title="放大">＋</button>
            <button class="icon-btn" onclick="zoomOut()" title="缩小">－</button>
            <span id="zoomLabel" style="font-size:10px;color:var(--text-muted);min-width:32px;text-align:center;">100%</span>
        </div>
    </div>

    <!-- 强制输入面板 -->
    <div class="force-panel" id="forcePanel"></div>

    <!-- 属性编辑弹窗 -->
    <div class="modal-bg" id="propModal">
        <div class="modal-box">
            <div class="modal-title">编辑元件属性</div>
            <div class="form-row"><label>类型</label><input type="text" id="propType" readonly></div>
            <div class="form-row"><label>地址</label><input type="text" id="propAddr" placeholder="I0.0 / Q0.0 / M0.0 / T0 / C0" list="addrList"></div>
            <datalist id="addrList"></datalist>
            <div class="form-row" id="presetRow" style="display:none;"><label>预设值</label><input type="number" id="propPreset" placeholder="1000"></div>
            <div class="form-row" id="srcRow" style="display:none;"><label>源值</label><input type="text" id="propSrc" placeholder="0"></div>
            <div class="modal-btns">
                <button class="btn-s success" onclick="confirmProp()">确定</button>
                <button class="btn-s danger" onclick="deleteElement()">删除</button>
                <button class="btn-s" onclick="closeModal('propModal')" style="background:#555;">取消</button>
            </div>
        </div>
    </div>

    <!-- 代码片段弹窗 -->
    <div class="modal-bg" id="snippetModal">
        <div class="modal-box" style="max-width:500px;">
            <div class="modal-title">代码片段库</div>
            <div id="snippetList"></div>
            <div class="modal-btns"><button class="btn-s" onclick="closeModal('snippetModal')" style="background:#555;width:100%;">关闭</button></div>
        </div>
    </div>

    <!-- 新建项目弹窗 -->
    <div class="modal-bg" id="newProjModal">
        <div class="modal-box">
            <div class="modal-title">新建项目</div>
            <div class="form-row"><label>项目名称</label><input type="text" id="newProjName" placeholder="我的PLC程序"></div>
            <div class="modal-btns">
                <button class="btn-s success" onclick="confirmNewProject()">创建</button>
                <button class="btn-s" onclick="closeModal('newProjModal')" style="background:#555;">取消</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

<script>
// =====================================================
//  全局状态
// =====================================================
let program = { name: '未命名项目', rungs: [] };
let selectedTool = null;
let selectedCell = null; // { rungIdx, elemIdx }
let elemIdSeq = 1;
let isRunning = false;
let simInterval = null;
let zoomLevel = 1.0;
let lastAddr = 'I0.0';
let undoStack = [];
let redoStack = [];
const SIM_SCAN_MS = 100;

// 变量内存
let V = {}; // { 'I0.0': false, 'Q0.0': false, 'M0.0': false, 'T0': {type:'ton',pt:1000,et:0,done:false,running:false}, 'C0': {type:'ctu',pv:10,cv:0,done:false} }

// =====================================================
//  指令定义
// =====================================================
const INST = {
    contact_n:   { sym: '-| |-', name: '常开触点', cat: 'input',  defAddr: 'I0.0' },
    contact_nc:  { sym: '-|/|-', name: '常闭触点', cat: 'input',  defAddr: 'I0.1' },
    coil:        { sym: '-( )-', name: '线圈',     cat: 'output', defAddr: 'Q0.0' },
    coil_set:    { sym: '-(S)-', name: '置位',     cat: 'output', defAddr: 'Q0.0' },
    coil_reset:  { sym: '-(R)-', name: '复位',     cat: 'output', defAddr: 'Q0.0' },
    timer_on:    { sym: 'TON',   name: '延时通',   cat: 'timer',  defAddr: 'T0' },
    timer_off:   { sym: 'TOF',   name: '延时断',   cat: 'timer',  defAddr: 'T1' },
    counter_up:  { sym: 'CTU',   name: '计数器',   cat: 'counter',defAddr: 'C0' },
    move:        { sym: 'MOV',   name: '传送',     cat: 'data',   defAddr: 'MW0' },
    compare_eq:  { sym: '==',    name: '比较等于', cat: 'logic',  defAddr: 'MW0' },
};

// =====================================================
//  代码片段库
// =====================================================
const SNIPPETS = [
    { name: '起保停电路', desc: '经典电机启保停，自锁逻辑', preview: 'I0.0 ─┬─ I0.1 ─ Q0.0\nQ0.0 ─┘', rungs: [
        { elements: [
            { type:'contact_n', addr:'I0.0', parallel:false },
            { type:'contact_n', addr:'Q0.0', parallel:true },
            { type:'contact_nc', addr:'I0.1', parallel:false },
            { type:'coil', addr:'Q0.0', parallel:false },
        ]}
    ]},
    { name: '电机正反转', desc: '互锁正反转控制，带电气互锁', preview: 'I0.0─I0.2─Q0.1─Q0.0\nI0.1─I0.2─Q0.0─Q0.1', rungs: [
        { elements: [
            { type:'contact_n', addr:'I0.0', parallel:false },
            { type:'contact_nc', addr:'I0.2', parallel:false },
            { type:'contact_nc', addr:'Q0.1', parallel:false },
            { type:'coil', addr:'Q0.0', parallel:false },
        ]},
        { elements: [
            { type:'contact_n', addr:'I0.1', parallel:false },
            { type:'contact_nc', addr:'I0.2', parallel:false },
            { type:'contact_nc', addr:'Q0.0', parallel:false },
            { type:'coil', addr:'Q0.1', parallel:false },
        ]}
    ]},
    { name: '星三角启动', desc: 'Y-△降压启动，定时器切换', preview: 'Q0.0(Y)→TON→Q0.1(△)', rungs: [
        { elements: [
            { type:'contact_n', addr:'I0.0', parallel:false },
            { type:'contact_nc', addr:'I0.1', parallel:false },
            { type:'contact_n', addr:'Q0.0', parallel:true },
            { type:'contact_nc', addr:'Q0.1', parallel:false },
            { type:'coil', addr:'Q0.0', parallel:false },

function selectTool(type) {
    selectedTool = selectedTool === type ? null : type;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.type === selectedTool));
    if (selectedTool) toast('已选: ' + INST[type].name);

// =====================================================

// =====================================================
function addRung() {
    saveUndo();
    program.rungs.push({ id: elemIdSeq++, elements: [] });
    render();
}

function removeRung(idx) {
    if (program.rungs.length <= 1) { toast('至少保留一个梯级'); return; }
    saveUndo();
    program.rungs.splice(idx, 1);
    render();
}

// =====================================================
//  元件操作
// =====================================================
function addElement(rungIdx) {
    if (!selectedTool) { toast('请先从左侧选择指令'); return; }
    saveUndo();
    const inst = INST[selectedTool];
    const el = { id: elemIdSeq++, type: selectedTool, addr: lastAddr, preset: 1000, src: 0 };
    if (inst.cat === 'input') el.addr = lastAddr.startsWith('I') || lastAddr.startsWith('M') || lastAddr.startsWith('Q') ? lastAddr : inst.defAddr;
    else if (inst.cat === 'output') el.addr = lastAddr.startsWith('Q') || lastAddr.startsWith('M') ? lastAddr : inst.defAddr;
    else if (inst.cat === 'timer') el.addr = lastAddr.startsWith('T') ? lastAddr : inst.defAddr;
    else if (inst.cat === 'counter') el.addr = lastAddr.startsWith('C') ? lastAddr : inst.defAddr;
    else el.addr = inst.defAddr;
    program.rungs[rungIdx].elements.push(el);
    ensureVar(el.addr, el.type);
    render();
    toast('已添加: ' + inst.name);
}

function openPropEditor(rungIdx, elemIdx) {
    const el = program.rungs[rungIdx].elements[elemIdx];
    selectedCell = { rungIdx, elemIdx };
    document.getElementById('propType').value = INST[el.type]?.name || el.type;
    document.getElementById('propAddr').value = el.addr;
    const presetRow = document.getElementById('presetRow');
    const srcRow = document.getElementById('srcRow');
    if (el.type === 'timer_on' || el.type === 'timer_off' || el.type === 'counter_up') {
        presetRow.style.display = 'block';
        document.getElementById('propPreset').value = el.preset || 1000;
    } else { presetRow.style.display = 'none'; }
    if (el.type === 'move' || el.type === 'compare_eq') {
        srcRow.style.display = 'block';
        document.getElementById('propSrc').value = el.src || 0;
    } else { srcRow.style.display = 'none'; }
    showModal('propModal');
}

function confirmProp() {
    if (!selectedCell) return;
    saveUndo();
    const el = program.rungs[selectedCell.rungIdx].elements[selectedCell.elemIdx];
    el.addr = document.getElementById('propAddr').value.trim();
    lastAddr = el.addr;
    if (el.type === 'timer_on' || el.type === 'timer_off' || el.type === 'counter_up') {
        el.preset = parseInt(document.getElementById('propPreset').value) || 1000;

    render();

}

function deleteElement() {
    if (!selectedCell) return;
    saveUndo();
    program.rungs[selectedCell.rungIdx].elements.splice(selectedCell.elemIdx, 1);

// =====================================================
//  撤销 / 重做
// =====================================================
function saveUndo() { undoStack.push(JSON.stringify(program)); if (undoStack.length > 50) undoStack.shift(); redoStack = []; }
function undo() {
    if (!undoStack.length) { toast('无法撤销'); return; }
    redoStack.push(JSON.stringify(program));
    program = JSON.parse(undoStack.pop());
    render(); toast('已撤销');
}
function redo() {
    if (!redoStack.length) { toast('无法重做'); return; }
    undoStack.push(JSON.stringify(program));
    program = JSON.parse(redoStack.pop());
    render(); toast('已重做');
}

// =====================================================
//  变量管理
// =====================================================
function ensureVar(addr, type) {
    if (!addr) return;
    if (type === 'timer_on' || type === 'timer_off') {
        if (!V[addr] || typeof V[addr] !== 'object') V[addr] = { type: type === 'timer_on' ? 'ton' : 'tof', pt: 1000, et: 0, done: false, running: false, lastInput: false };
    } else if (type === 'counter_up') {
        if (!V[addr] || typeof V[addr] !== 'object') V[addr] = { type: 'ctu', pv: 10, cv: 0, done: false, lastCU: false };
    } else {
        if (!(addr in V)) V[addr] = false;
    }
}

function collectVars() {
    V = {};
    for (const rung of program.rungs) {
        for (const el of rung.elements) {
            ensureVar(el.addr, el.type);
            if (el.type === 'timer_on' || el.type === 'timer_off') {
                V[el.addr].pt = el.preset || 1000;
            } else if (el.type === 'counter_up') {
                V[el.addr].pv = el.preset || 10;
            }
        }
    }
    // 确保基础I/O存在
    for (let i = 0; i < 4; i++) { if (!(('I0.'+i) in V)) V['I0.'+i] = false; if (!(('Q0.'+i) in V)) V['Q0.'+i] = false; }
    if (!('M0.0' in V)) V['M0.0'] = false;
    if (!('M0.1' in V)) V['M0.1'] = false;
}

function getBit(addr) {
    if (addr in V) {
        const v = V[addr];
        if (typeof v === 'boolean') return v;
        if (typeof v === 'object' && v !== null) return !!v.done;
    }
    return false;
}

function setBit(addr, val) {
    if (addr in V && typeof V[addr] === 'boolean') V[addr] = !!val;
}

function rebuildAddrList() {
    const dl = document.getElementById('addrList');
    const addrs = Object.keys(V).sort();
    dl.innerHTML = addrs.map(a => `<option value="${a}">`).join('');
}

// =====================================================
//  仿真引擎 - 完整PLC扫描周期
// =====================================================
function startSim() {
    if (isRunning) return;
    collectVars();
    // 重置定时器和计数器状态
    for (const [a, v] of Object.entries(V)) {
        if (typeof v === 'object') {
            if (v.type === 'ton' || v.type === 'tof') { v.et = 0; v.done = false; v.running = false; v.lastInput = false; }
            if (v.type === 'ctu') { v.cv = 0; v.done = false; v.lastCU = false; }
        } else { V[a] = false; }
    }
    isRunning = true;
    document.getElementById('runBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-block';
    document.getElementById('statusDot').classList.add('run');
    document.getElementById('plcStatus').textContent = 'RUN';
    document.getElementById('forcePanel').classList.add('show');
    simInterval = setInterval(simScan, SIM_SCAN_MS);
    render();
    toast('仿真运行中...');
}

function stopSim() {
    isRunning = false;
    clearInterval(simInterval);
    document.getElementById('runBtn').style.display = 'inline-block';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('statusDot').classList.remove('run');
    document.getElementById('plcStatus').textContent = 'STOP';
    document.getElementById('forcePanel').classList.remove('show');
    render();
    toast('仿真已停止');
}

function simScan() {
    // 执行梯形图逻辑
    for (const rung of program.rungs) {
        executeRung(rung);
    }
    // 更新定时器
    for (const [a, v] of Object.entries(V)) {
        if (typeof v === 'object' && (v.type === 'ton' || v.type === 'tof')) {
            if (v.running) {
                v.et += SIM_SCAN_MS;
                if (v.et >= v.pt) { v.et = v.pt; v.done = true; }
            }
        }
    }
    render();
    renderMonitor();
    renderForcePanel();
}

function executeRung(rung) {
    // 简化模型：梯级内所有元件串联，parallel标记的元件与前一元件并联
    // 分组：并联的元件归为一组
    const groups = []; // 每组 elements 之间是 OR 关系，组之间是 AND
    let currentGroup = [];
    for (const el of rung.elements) {
        if (el.parallel) {
            currentGroup.push(el);
        } else {
            if (currentGroup.length > 0) groups.push(currentGroup);
            currentGroup = [el];
        }
    }
    if (currentGroup.length > 0) groups.push(currentGroup);

    // 计算每组的通断
    let rungPower = true;
    for (const group of groups) {
        let groupResult = false;
        for (const el of group) {
            const elResult = evalElement(el);
            groupResult = groupResult || elResult;
        }
        rungPower = rungPower && groupResult;
    }

    // 执行输出元件
    for (const el of rung.elements) {
        execOutput(el, rungPower);
    }

    // 记录梯级通电状态用于UI
    rung._energized = rungPower;
}

function evalElement(el) {
    const addr = el.addr;
    switch (el.type) {
        case 'contact_n': return getBit(addr);
        case 'contact_nc': return !getBit(addr);
        case 'timer_on': case 'timer_off': return getBit(addr); // done位
        case 'counter_up': return getBit(addr); // done位
        case 'coil': case 'coil_set': case 'coil_reset': return true; // 线圈不影响前方通断
        case 'move': case 'compare_eq': return true; // 功能块视为通
        default: return true;
    }
}

function execOutput(el, power) {
    const addr = el.addr;
    switch (el.type) {
        case 'coil':
            setBit(addr, power);
            break;
        case 'coil_set':
            if (power) setBit(addr, true);
            break;
        case 'coil_reset':
            if (power) setBit(addr, false);
            break;
        case 'timer_on': {
            const t = V[addr];
            if (typeof t === 'object' && t.type === 'ton') {
                const input = power;
                if (input && !t.lastInput) { t.running = true; t.et = 0; t.done = false; }
                if (!input) { t.running = false; t.et = 0; t.done = false; }
                t.lastInput = input;
            }
            break;
        }
        case 'timer_off': {
            const t = V[addr];
            if (typeof t === 'object' && t.type === 'tof') {
                const input = power;
                if (input) { t.done = true; t.running = false; t.et = t.pt; }
                if (!input && t.lastInput) { t.running = true; t.et = 0; t.done = true; }
                if (t.running && !input) {
                    if (t.et >= t.pt) { t.done = false; t.running = false; }
                }
                t.lastInput = input;
            }
            break;
        }
        case 'counter_up': {
            const c = V[addr];
            if (typeof c === 'object' && c.type === 'ctu') {
                const cu = power;
                if (cu && !c.lastCU) { c.cv++; if (c.cv >= c.pv) c.done = true; }
                c.lastCU = cu;
            }
            break;
        }
        case 'move':
            if (power && addr in V) { V[addr] = el.src || 0; }
            break;
        case 'compare_eq':
            // 简化：直接通过
            break;
    }
}

// =====================================================
//  渲染
// =====================================================
function render() {
    const container = document.getElementById('rungsContainer');
    container.innerHTML = '';

    program.rungs.forEach((rung, ri) => {
        const row = document.createElement('div');
        row.className = 'rung-row';
        row.dataset.rungIdx = ri;

        // 梯级标签
        const label = document.createElement('span');
        label.className = 'rung-label';
        label.textContent = ri + 1;
        row.appendChild(label);

        // 梯级线
        const line = document.createElement('div');
        line.className = 'rung-line' + (rung._energized ? ' energized' : '');
        row.appendChild(line);

        // 元件区
        const cells = document.createElement('div');
        cells.className = 'rung-cells';

        rung.elements.forEach((el, ei) => {
            const inst = INST[el.type] || { sym: el.type, name: el.type };
            const cell = document.createElement('div');
            let classes = 'cell';
            if (selectedCell && selectedCell.rungIdx === ri && selectedCell.elemIdx === ei) classes += ' selected';
            if (isRunning) {
                const energized = isElementEnergized(el, ri);
                if (energized) classes += ' energized';
            }
            cell.className = classes;
            cell.innerHTML = `<div class="cell-symbol">${inst.sym}</div><div class="cell-addr">${el.addr}${el.preset && (el.type==='timer_on'||el.type==='timer_off'||el.type==='counter_up') ? '<br>'+formatPreset(el) : ''}</div>`;
            cell.onclick = (e) => { e.stopPropagation(); openPropEditor(ri, ei); };
            cells.appendChild(cell);
        });

        // 加号
        const addBtn = document.createElement('div');
        addBtn.className = 'cell-add';
        addBtn.textContent = '+';
        addBtn.onclick = (e) => { e.stopPropagation(); addElement(ri); };
        cells.appendChild(addBtn);

        row.appendChild(cells);

        // 梯级操作
        const rOp = document.createElement('div');
        rOp.style.cssText = 'position:absolute;right:4px;top:2px;display:flex;gap:2px;';
        rOp.innerHTML = `<button class="icon-btn" style="width:18px;height:18px;font-size:10px;" onclick="event.stopPropagation();removeRung(${ri})" title="删除梯级">✕</button>`;
        row.appendChild(rOp);

        container.appendChild(row);
    });

    // 更新母线SVG高度
    requestAnimationFrame(() => {
        const h = document.getElementById('editorInner').scrollHeight;
        document.getElementById('railSvg').style.height = h + 'px';
        document.getElementById('railSvg').querySelector('line').setAttribute('y2', h);
    });

    if (isRunning) { renderMonitor(); renderForcePanel(); }
}

function isElementEnergized(el, rungIdx) {
    const rung = program.rungs[rungIdx];
    if (!rung) return false;
    switch (el.type) {
        case 'contact_n': return getBit(el.addr);
        case 'contact_nc': return !getBit(el.addr);
        case 'coil': case 'coil_set': case 'coil_reset': return getBit(el.addr);
        case 'timer_on': case 'timer_off': { const v = V[el.addr]; return typeof v === 'object' ? v.done : false; }
        case 'counter_up': { const v = V[el.addr]; return typeof v === 'object' ? v.done : false; }
        default: return false;
    }
}

function formatPreset(el) {
    if (el.type === 'timer_on' || el.type === 'timer_off') {
        const ms = el.preset || 1000;
        return ms >= 1000 ? (ms/1000) + 's' : ms + 'ms';
    }
    if (el.type === 'counter_up') return 'PV:' + (el.preset || 10);
    return '';
}

// =====================================================
//  监控面板
// =====================================================
function renderMonitor() {
    const list = document.getElementById('monList');
    list.innerHTML = '';
    for (const [addr, val] of Object.entries(V).sort()) {
        const item = document.createElement('div');
        if (typeof val === 'boolean') {
            item.className = 'mon-item';
            item.innerHTML = `<span class="mon-name">${addr}</span><span class="mon-val ${val?'on':'off'}">${val?'1':'0'}</span>`;
        } else if (typeof val === 'object' && val !== null) {
            item.className = 'mon-timer';
            if (val.type === 'ton' || val.type === 'tof') {
                const pct = val.pt > 0 ? Math.min(100, (val.et / val.pt) * 100) : 0;
                item.innerHTML = `<div style="display:flex;justify-content:space-between;"><span class="mon-name">${addr}</span><span>${(val.et/1000).toFixed(1)}s/${(val.pt/1000).toFixed(1)}s ${val.done?'✓':''}</span></div><div class="bar" style="width:${pct}%"></div>`;
            } else if (val.type === 'ctu') {
                const pct = val.pv > 0 ? Math.min(100, (val.cv / val.pv) * 100) : 0;
                item.innerHTML = `<div style="display:flex;justify-content:space-between;"><span class="mon-name">${addr}</span><span>${val.cv}/${val.pv} ${val.done?'✓':''}</span></div><div class="bar" style="width:${pct}%"></div>`;
            }
        }
        list.appendChild(item);
    }
}

// =====================================================
//  强制输入面板
// =====================================================
function renderForcePanel() {
    const panel = document.getElementById('forcePanel');
    panel.innerHTML = '';
    for (const [addr, val] of Object.entries(V).sort()) {
        if (addr.startsWith('I') && typeof val === 'boolean') {
            const item = document.createElement('div');
            item.className = 'force-item';
            item.innerHTML = `<span class="force-lbl">${addr}</span><div class="force-sw ${val?'on':''}" onclick="toggleForce('${addr}')"></div>`;
            panel.appendChild(item);
        }
    }
}

function toggleForce(addr) {
    if (addr in V && typeof V[addr] === 'boolean') {
        V[addr] = !V[addr];
        lastAddr = addr;
        if (isRunning) { render(); renderMonitor(); renderForcePanel(); }
        else { render(); renderMonitor(); }
        toast(`${addr} = ${V[addr]?'1':'0'}`);
    }
}

    SNIPPETS.forEach((sn, idx) => {

        card.className = 'snippet-card';

        list.appendChild(card);

function loadSnippet(idx) {
    const sn = SNIPPETS[idx];
    saveUndo();
    program.rungs = [];
    for (const sr of sn.rungs) {
        const rung = { id: elemIdSeq++, elements: [] };
        for (const se of sr.elements) {
            const el = { id: elemIdSeq++, type: se.type, addr: se.addr || INST[se.type]?.defAddr || 'M0.0', preset: se.preset || 1000, src: 0, parallel: !!se.parallel };
            rung.elements.push(el);
            ensureVar(el.addr, el.type);
        }
        program.rungs.push(rung);
    }
    rebuildAddrList();
    render();
    closeModal('snippetModal');

function confirmNewProject() {
    const name = document.getElementById('newProjName').value.trim() || '未命名项目';
    saveUndo();
    program = { name, rungs: [] };
    V = {};
    elemIdSeq = 1;
    addRung(); addRung(); addRung();
    document.getElementById('projectName').textContent = name;
    closeModal('newProjModal');
    toast('新项目: ' + name);
}

function saveProgram() {
    const data = { name: program.name, rungs: program.rungs, v: Date.now() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (program.name || 'plc_program') + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('程序已保存');
}

function loadProgram() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                saveUndo();
                program = { name: data.name || '未命名项目', rungs: data.rungs || [] };
                V = {};
                for (const rung of program.rungs) for (const el of rung.elements) ensureVar(el.addr, el.type);
                collectVars();
                rebuildAddrList();
                document.getElementById('projectName').textContent = program.name;
                render();
                toast('已加载: ' + program.name);
            } catch (err) { toast('文件格式错误'); }
        };
        reader.readAsText(file);
    };
    input.click();
}

// =====================================================
//  UI辅助
// =====================================================
function toggleToolbar() { document.getElementById('leftToolbar').classList.toggle('collapsed'); }
function toggleMonitor() { document.getElementById('rightMonitor').classList.toggle('collapsed'); }

function zoomIn() { zoomLevel = Math.min(zoomLevel + 0.1, 2.0); applyZoom(); }
function zoomOut() { zoomLevel = Math.max(zoomLevel - 0.1, 0.5); applyZoom(); }
function applyZoom() {
    document.getElementById('editorInner').style.transform = `scale(${zoomLevel})`;
    document.getElementById('editorInner').style.transformOrigin = 'top left';
    document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
}

function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); selectedCell = null; }

function handleEditorClick(e) {
    if (e.target === document.getElementById('editorArea') || e.target === document.getElementById('editorInner')) {
        selectedCell = null;
        render();
    }
}

function showQuickAdd() { toast('请先从左侧选择指令，再点梯级 + 号添加'); }

let toastTimer = null;
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// 键盘快捷键
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
    if (e.key === 'Delete') { if (selectedCell) deleteElement(); }
});
</script>
